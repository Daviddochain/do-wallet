<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connect Do-Wallet</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0915;
        --panel: #171026;
        --panel-2: #21143a;
        --border: #36224f;
        --text: #ffffff;
        --muted: #a69bb8;
        --primary: #9d4dff;
        --primary-2: #31c8f3;
        --danger: #ff5c7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 360px;
        min-height: 560px;
        background:
          radial-gradient(circle at 15% 15%, rgba(157, 77, 255, 0.22), transparent 34%),
          radial-gradient(circle at 88% 12%, rgba(49, 200, 243, 0.16), transparent 32%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: flex;
        min-height: 560px;
        flex-direction: column;
        gap: 20px;
        padding: 28px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      header img {
        width: 44px;
        height: 44px;
        border-radius: 12px;
      }

      p,
      h1 {
        margin: 0;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin-top: 3px;
        font-size: 24px;
        line-height: 1.15;
      }

      .origin,
      .wallet {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(23, 16, 38, 0.82);
        padding: 16px;
      }

      .origin {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 12px;
        align-items: center;
      }

      .origin-icon {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 8px;
        background: var(--panel-2);
        color: var(--primary);
        font-size: 20px;
        font-weight: 900;
      }

      .label {
        font-size: 16px;
        font-weight: 800;
      }

      .subtle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }

      .permission {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .wallet {
        margin-top: auto;
      }

      .wallet-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .address {
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      footer {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      button {
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        color: var(--text);
        cursor: pointer;
        font: inherit;
        font-weight: 900;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      #deny {
        border: 1px solid rgba(255, 92, 122, 0.48);
        background: rgba(255, 92, 122, 0.12);
      }

      #connect {
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        box-shadow: 0 18px 34px rgba(93, 60, 177, 0.32);
      }

      #status {
        min-height: 20px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <img src="icon-48.png" alt="Do-Wallet" />
        <div>
          <p class="eyebrow">Do-Wallet</p>
          <h1>Connect to application</h1>
        </div>
      </header>

      <section class="origin">
        <div class="origin-icon">DO</div>
        <div>
          <p class="label" id="origin-name">Website request</p>
          <p class="subtle" id="origin-host">Checking request...</p>
        </div>
      </section>

      <p class="permission">Allow this site to view your wallet address and request wallet actions from Do-Wallet.</p>

      <section class="wallet">
        <div class="wallet-row">
          <div>
            <p class="label" id="wallet-name">Wallet</p>
            <p class="subtle">Selected account</p>
          </div>
        </div>
        <p class="address" id="wallet-address"></p>
      </section>

      <footer>
        <button id="deny" type="button">Deny</button>
        <button id="connect" type="button">Connect</button>
      </footer>

      <p id="status"></p>
    </main>

    <script src="connect-approval.js"></script>
  </body>
</html>
